name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    permissions:
      contents: write
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js dependencies
        run: npm ci

      # 构建 Python Sidecar（嵌入式 Python + 依赖），产物 sidecar_dist/ 会被 tauri build 打包
      # pretauri:build 钩子会自动执行 npm run sidecar:build，这里显式调用以确保 CI 中可见日志
      # 注意：build_sidecar.ps1 自包含 Python Embeddable 下载，无需 actions/setup-python
      - name: Build Python Sidecar (Embedded)
        run: npm run sidecar:build
        shell: pwsh

      # 使用 tauri-apps/tauri-action 构建、签名、生成 latest.json 并上传到 Release
      # 该 Action 会自动：
      # 1. 执行 tauri build（含签名，生成 .exe 和 .sig）
      # 2. 生成 latest.json（包含版本号、签名、下载链接等更新元数据）
      # 3. 创建/更新 GitHub Release 并上传所有产物
      - uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # 标签名，__VERSION__ 会被替换为 tauri.conf.json 中的版本号
          tagName: v__VERSION__
          # Release 标题
          releaseName: 'DocAgent v__VERSION__'
          # Release 草稿，方便检查后再发布
          releaseDraft: true
          prerelease: false
          # 优先使用 NSIS 安装器（项目使用 NSIS 打包）
          updaterJsonPreferNsis: true

      # 同步 Release 产物到 Gitee
      # 需要仓库 Secrets: GITEE_TOKEN（在 https://gitee.com/profile/personal_access_tokens 生成）
      # 权限要求：projects 基础权限即可
      - name: Sync release to Gitee
        shell: pwsh
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: xumingke-06
          GITEE_REPO: doc-agent
        run: |
          if (-not $env:GITEE_TOKEN) {
            Write-Host "::warning::GITEE_TOKEN 未设置，跳过 Gitee 同步"
            Write-Host "请前往 https://gitee.com/profile/personal_access_tokens 生成 Token"
            Write-Host "并添加到 GitHub Secrets: Settings -> Secrets and variables -> Actions -> New secret: GITEE_TOKEN"
            exit 0
          }

          $ErrorActionPreference = "Stop"

          # 从 tauri.conf.json 读取版本号，兼容 tag 推送和 workflow_dispatch 两种触发方式
          $configPath = "${{ github.workspace }}\src-tauri\tauri.conf.json"
          $configVersion = (Get-Content $configPath -Raw | ConvertFrom-Json).version
          $tagName = "v$configVersion"
          $releaseName = "DocAgent $tagName"

          # 查找构建产物
          $nsisDir = "${{ github.workspace }}\src-tauri\target\release\bundle\nsis"
          Write-Host "查找 NSIS 产物目录: $nsisDir"
          $exeFile = Get-ChildItem -Path $nsisDir -Filter "*_x64-setup.exe" | Select-Object -First 1
          $sigFile = Get-ChildItem -Path $nsisDir -Filter "*_x64-setup.exe.sig" | Select-Object -First 1
          if (-not $exeFile) {
            Write-Host "未找到 NSIS 安装包，尝试搜索其他路径..."
            $exeFile = Get-ChildItem -Path "${{ github.workspace }}" -Recurse -Filter "*_x64-setup.exe" | Select-Object -First 1
          }
          if (-not $exeFile) {
            Write-Host "::warning::未找到构建产物，跳过 Gitee 同步"
            exit 0
          }
          Write-Host "找到安装包: $($exeFile.FullName)"

          # 获取发布说明（从上个标签到当前标签的提交记录）
          $prevTag = & git describe --tags --abbrev=0 "${tagName}^" 2>$null
          if ($LASTEXITCODE -eq 0 -and $prevTag) {
            $releaseBody = & git log --oneline "$prevTag..$tagName" 2>$null
            if (-not $releaseBody) { $releaseBody = "DocAgent $tagName" }
          } else {
            $releaseBody = "DocAgent $tagName"
          }

          # Gitee API 基础地址
          $apiBase = "https://gitee.com/api/v5/repos/$env:GITEE_OWNER/$env:GITEE_REPO"
          $tokenParam = "access_token=$env:GITEE_TOKEN"

          # 检查是否已存在同名 Release，若存在则获取其 ID
          Write-Host "检查 Gitee 上是否已存在 Release: $tagName"
          $releaseId = $null
          try {
            $existing = Invoke-RestMethod -Uri "$apiBase/releases/tags/$tagName?$tokenParam" -Method Get
            if ($existing.id) {
              $releaseId = $existing.id
              Write-Host "Release 已存在，ID: $releaseId"
            } else {
              Write-Host "Release 存在但 ID 为空，将通过列表重新获取"
            }
          } catch {
            Write-Host "Release 不存在，将新建"
          }

          if (-not $releaseId) {
            # 创建 Release
            $createBody = @{
              tag_name = $tagName
              name = $releaseName
              body = $releaseBody.Trim()
              prerelease = $false
              target_commitish = "main"
            } | ConvertTo-Json

            Write-Host "正在 Gitee 上创建 Release: $tagName"
            try {
              $response = Invoke-RestMethod -Uri "$apiBase/releases?$tokenParam" -Method Post `
                -Body $createBody -ContentType "application/json"
              $releaseId = $response.id
              Write-Host "Gitee Release 创建成功，ID: $releaseId"
            } catch {
              $statusCode = [int]$_.Exception.Response.StatusCode
              $detail = $_.ErrorDetails.Message
              if ($statusCode -eq 401) {
                Write-Host "::warning::Gitee Token 认证失败，请检查 GITEE_TOKEN 是否有效"
                exit 0
              } elseif ($statusCode -eq 404) {
                Write-Host "::warning::Gitee 仓库不存在或 Token 无权限"
                exit 0
              } elseif ($statusCode -eq 400) {
                Write-Host "创建失败（400），尝试列出 Releases 查找现有 ID"
                try {
                  $releases = Invoke-RestMethod -Uri "$apiBase/releases?$tokenParam&per_page=100" -Method Get
                  $existing = $releases | Where-Object { $_.tag_name -eq $tagName } | Select-Object -First 1
                  if ($existing -and $existing.id) {
                    $releaseId = $existing.id
                    Write-Host "找到现有 Release，ID: $releaseId"
                  } else {
                    Write-Host "::warning::无法找到现有 Release: $detail"
                    exit 0
                  }
                } catch {
                  Write-Host "::warning::获取 Release 列表失败: $($_.Exception.Message)"
                  exit 0
                }
              } else {
                Write-Host "::warning::Gitee Release 创建失败 ($statusCode): $detail"
                exit 0
              }
            }
          }

          # 上传附件到 Gitee Release
          function Upload-FileToGitee {
            param([string]$FilePath, [int]$ReleaseId)
            $uploadUrl = "$apiBase/releases/$ReleaseId/attach_files?$tokenParam"
            $fileItem = Get-Item -Path $FilePath
            Write-Host "正在上传: $($fileItem.Name) ($([math]::Round($fileItem.Length/1MB,2)) MB)"

            # 使用 System.Net.Http.MultipartFormDataContent 上传大文件
            try {
              $client = New-Object System.Net.Http.HttpClient
              $client.Timeout = [System.TimeSpan]::FromMinutes(10)
              $content = New-Object System.Net.Http.MultipartFormDataContent
              $fileStream = [System.IO.File]::OpenRead($fileItem.FullName)
              $fileContent = New-Object System.Net.Http.StreamContent($fileStream)
              $content.Add($fileContent, "file", $fileItem.Name)
              $response = $client.PostAsync($uploadUrl, $content).GetAwaiter().GetResult()
              $fileStream.Close()
              $client.Dispose()
              if ($response.IsSuccessStatusCode) {
                Write-Host "上传成功: $($fileItem.Name)"
              } else {
                Write-Host "::warning::上传失败: $($fileItem.Name) - $($response.StatusCode)"
              }
            } catch {
              Write-Host "::warning::上传失败: $($fileItem.Name) - $($_.Exception.Message)"
            }
          }

          # 构造 Gitee 专用的 latest.json（指向 Gitee 下载地址）
          $giteeUrlBase = "https://gitee.com/$env:GITEE_OWNER/$env:GITEE_REPO/releases/download/$tagName"
          $exeName = $exeFile.Name
          $signature = ""
          if ($sigFile) {
            $signature = (Get-Content $sigFile.FullName -Raw).Trim()
          }
          $latestJsonObj = @{
            version = $configVersion
            notes = $releaseBody.Trim()
            pub_date = [System.DateTime]::UtcNow.ToString("yyyy-MM-ddTHH:mm:ss.fffK")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = "$giteeUrlBase/$exeName"
              }
              "windows-x86_64-nsis" = @{
                signature = $signature
                url = "$giteeUrlBase/$exeName"
              }
            }
          }

          # 保存到工作区 updater/latest.json（提交到仓库用）
          $repoUpdaterDir = "${{ github.workspace }}\updater"
          if (-not (Test-Path $repoUpdaterDir)) {
            New-Item -ItemType Directory -Path $repoUpdaterDir -Force | Out-Null
          }
          $giteeLatestJsonPath = "$repoUpdaterDir\latest.json"
          $latestJsonObj | ConvertTo-Json -Depth 10 | Set-Content -Path $giteeLatestJsonPath
          Write-Host "Gitee latest.json 已生成并保存到仓库 updater/latest.json"

          # 上传 Gitee latest.json 到 Gitee Release
          Upload-FileToGitee -FilePath $giteeLatestJsonPath -ReleaseId $releaseId

          # 上传 .exe 和 .sig
          Upload-FileToGitee -FilePath $exeFile.FullName -ReleaseId $releaseId
          if ($sigFile) {
            Upload-FileToGitee -FilePath $sigFile.FullName -ReleaseId $releaseId
          }

          Write-Host "Gitee 同步完成"
          Write-Host "Release 地址: https://gitee.com/$env:GITEE_OWNER/$env:GITEE_REPO/releases/$tagName"
          $global:LASTEXITCODE = 0

      # 提交 updater/latest.json 到 GitHub 和 Gitee 仓库
      - name: Commit updater/latest.json to repository
        shell: pwsh
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          $updaterFile = "${{ github.workspace }}\updater\latest.json"
          if (-not (Test-Path $updaterFile)) {
            Write-Host "updater/latest.json 不存在，跳过提交"
            exit 0
          }

          # 检查是否有变更
          $hasChanges = & git status --porcelain updater/latest.json
          if (-not $hasChanges) {
            Write-Host "updater/latest.json 无变更，跳过提交"
            exit 0
          }

          # 读取版本号
          $configPath = "${{ github.workspace }}\src-tauri\tauri.conf.json"
          $configVersion = (Get-Content $configPath -Raw | ConvertFrom-Json).version

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updater/latest.json
          git commit -m "chore: update Gitee latest.json for v$configVersion [skip ci]"

          # 推送到 GitHub（使用 GITHUB_TOKEN）
          git push origin HEAD:main
          Write-Host "已推送到 GitHub"

          # 同时推送到 Gitee（使用 GITEE_TOKEN）
          if ($env:GITEE_TOKEN) {
            git remote add gitee_push "https://xumingke-06:$env:GITEE_TOKEN@gitee.com/xumingke-06/doc-agent.git"
            git push gitee_push HEAD:main
            git remote remove gitee_push
            Write-Host "已推送到 Gitee"
          } else {
            Write-Host "::warning::GITEE_TOKEN 未设置，跳过 Gitee 推送"
          }
          Write-Host "updater/latest.json 已提交并同步到两个平台"
