name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    permissions:
      contents: write
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js dependencies
        run: npm ci

      # 构建 Python Sidecar（嵌入式 Python + 依赖），产物 sidecar_dist/ 会被 tauri build 打包
      # pretauri:build 钩子会自动执行 npm run sidecar:build，这里显式调用以确保 CI 中可见日志
      # 注意：build_sidecar.ps1 自包含 Python Embeddable 下载，无需 actions/setup-python
      - name: Build Python Sidecar (Embedded)
        run: npm run sidecar:build
        shell: pwsh

      # 使用 tauri-apps/tauri-action 构建、签名、生成 latest.json 并上传到 Release
      # 该 Action 会自动：
      # 1. 执行 tauri build（含签名，生成 .exe 和 .sig）
      # 2. 生成 latest.json（包含版本号、签名、下载链接等更新元数据）
      # 3. 创建/更新 GitHub Release 并上传所有产物
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # 标签名，__VERSION__ 会被替换为 tauri.conf.json 中的版本号
          tagName: v__VERSION__
          # Release 标题
          releaseName: 'DocAgent v__VERSION__'
          # Release 草稿，方便检查后再发布
          releaseDraft: true
          prerelease: false
          # 优先使用 NSIS 安装器（项目使用 NSIS 打包）
          updaterJsonPreferNsis: true
