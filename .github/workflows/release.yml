name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    permissions:
      contents: write
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js dependencies
        run: npm ci

      # 构建 Python Sidecar（嵌入式 Python + 依赖），产物 sidecar_dist/ 会被 tauri build 打包
      # pretauri:build 钩子会自动执行 npm run sidecar:build，这里显式调用以确保 CI 中可见日志
      # 注意：build_sidecar.ps1 自包含 Python Embeddable 下载，无需 actions/setup-python
      - name: Build Python Sidecar (Embedded)
        run: npm run sidecar:build
        shell: pwsh

      # 使用 tauri-apps/tauri-action 构建、签名、生成 latest.json 并上传到 Release
      # 该 Action 会自动：
      # 1. 执行 tauri build（含签名，生成 .exe 和 .sig）
      # 2. 生成 latest.json（包含版本号、签名、下载链接等更新元数据）
      # 3. 创建/更新 GitHub Release 并上传所有产物
      - uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # 标签名，__VERSION__ 会被替换为 tauri.conf.json 中的版本号
          tagName: v__VERSION__
          # Release 标题
          releaseName: 'DocAgent v__VERSION__'
          # 直接发布 Release（非草稿），CDN 代理需要公开访问权限
          # 原先为草稿模式，但 Cloudflare Worker 无法代理草稿 Release（需要认证）
          releaseDraft: false
          prerelease: false
          # 优先使用 NSIS 安装器（项目使用 NSIS 打包）
          updaterJsonPreferNsis: true

      # 生成 CDN 代理版本的 latest.json 并覆盖到 GitHub Release
      # 背景：tauri-action 生成的 latest.json 中 URL 指向 GitHub Release 直链，国内下载慢
      # 此步骤将 URL 替换为 Cloudflare Worker 代理地址，国内用户通过 CDN 加速下载
      # Worker 代码见 cloudflare/worker.js，部署说明见同文件头部注释
      - name: Generate CDN latest.json and upload to Release
        shell: pwsh
        env:
          # CDN 代理基础 URL（Cloudflare Worker 地址）
          # 需在 GitHub Secrets 中配置 CDN_BASE_URL，例如: https://docagent-proxy.your-name.workers.dev
          # 未配置时降级为 GitHub Release 直链（国内下载可能较慢）
          CDN_BASE_URL: ${{ secrets.CDN_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"

          # 从 tauri.conf.json 读取版本号
          $configPath = "${{ github.workspace }}\src-tauri\tauri.conf.json"
          $configVersion = (Get-Content $configPath -Raw | ConvertFrom-Json).version
          $tagName = "v$configVersion"
          Write-Host "版本号: $configVersion, 标签: $tagName"

          # 查找 NSIS 构建产物
          $nsisDir = "${{ github.workspace }}\src-tauri\target\release\bundle\nsis"
          Write-Host "查找 NSIS 产物目录: $nsisDir"
          $exeFile = Get-ChildItem -Path $nsisDir -Filter "*_x64-setup.exe" | Select-Object -First 1
          $sigFile = Get-ChildItem -Path $nsisDir -Filter "*_x64-setup.exe.sig" | Select-Object -First 1
          if (-not $exeFile) {
            Write-Host "未找到 NSIS 安装包，尝试搜索其他路径..."
            $exeFile = Get-ChildItem -Path "${{ github.workspace }}" -Recurse -Filter "*_x64-setup.exe" | Select-Object -First 1
          }
          if (-not $exeFile) {
            Write-Host "::error::未找到 NSIS 构建产物，无法生成 latest.json"
            exit 1
          }
          Write-Host "找到安装包: $($exeFile.FullName)"

          # 决定下载 URL 基础地址
          # 优先使用 CDN 代理，未配置则降级为 GitHub Release 直链
          $exeName = $exeFile.Name
          $cdnBaseUrl = $env:CDN_BASE_URL
          if ($cdnBaseUrl) {
            $cdnBaseUrl = $cdnBaseUrl.TrimEnd('/')
            $downloadUrlBase = "$cdnBaseUrl/releases/download/$tagName"
            Write-Host "使用 CDN 代理下载地址: $downloadUrlBase/$exeName"
          } else {
            $downloadUrlBase = "https://github.com/${{ github.repository }}/releases/download/$tagName"
            Write-Host "::warning::CDN_BASE_URL 未配置，降级为 GitHub Release 直链"
            Write-Host "::warning::国内用户下载可能较慢，请配置 Cloudflare Worker 并设置 CDN_BASE_URL Secret"
          }

          # 读取签名文件
          $signature = ""
          if ($sigFile) {
            $signature = (Get-Content $sigFile.FullName -Raw).Trim()
            Write-Host "已加载签名文件: $($sigFile.Name)"
          } else {
            Write-Host "::warning::未找到签名文件 (.sig)"
          }

          # 获取发布说明（从上个标签到当前标签的提交记录）
          $releaseBody = "DocAgent $tagName"
          $prevTag = & git describe --tags --abbrev=0 "${tagName}^" 2>$null
          if ($LASTEXITCODE -eq 0 -and $prevTag) {
            $body = & git log --oneline "$prevTag..$tagName" 2>$null
            if ($body) { $releaseBody = $body }
          }

          # 构造 latest.json（URL 指向 CDN 代理）
          $latestJsonObj = @{
            version = $configVersion
            notes = $releaseBody.Trim()
            pub_date = [System.DateTime]::UtcNow.ToString("yyyy-MM-ddTHH:mm:ss.fffK")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = "$downloadUrlBase/$exeName"
              }
              "windows-x86_64-nsis" = @{
                signature = $signature
                url = "$downloadUrlBase/$exeName"
              }
            }
          }

          # 保存到仓库 updater/latest.json（供 endpoints 读取）
          $repoUpdaterDir = "${{ github.workspace }}\updater"
          if (-not (Test-Path $repoUpdaterDir)) {
            New-Item -ItemType Directory -Path $repoUpdaterDir -Force | Out-Null
          }
          $latestJsonPath = "$repoUpdaterDir\latest.json"
          $latestJsonObj | ConvertTo-Json -Depth 10 | Set-Content -Path $latestJsonPath -Encoding UTF8
          Write-Host "latest.json 已生成:"
          Get-Content $latestJsonPath | Write-Host

          # 上传 latest.json 到 GitHub Release（覆盖 tauri-action 生成的版本）
          # 这样 Tauri updater 通过 endpoints 访问到的 latest.json 中 URL 指向 CDN
          $repo = "${{ github.repository }}"
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          # 通过 tag 获取 Release ID 和现有 assets
          $releaseApiUrl = "https://api.github.com/repos/$repo/releases/tags/$tagName"
          $releaseInfo = Invoke-RestMethod -Uri $releaseApiUrl -Method Get -Headers $headers
          $releaseId = $releaseInfo.id
          Write-Host "GitHub Release ID: $releaseId"

          # 删除现有的 latest.json asset（如有），避免重复
          $existingAsset = $releaseInfo.assets | Where-Object { $_.name -eq "latest.json" } | Select-Object -First 1
          if ($existingAsset) {
            $delUrl = "https://api.github.com/repos/$repo/releases/assets/$($existingAsset.id)"
            Invoke-RestMethod -Uri $delUrl -Method Delete -Headers $headers | Out-Null
            Write-Host "已删除现有 latest.json asset (ID: $($existingAsset.id))"
          }

          # 上传 CDN 版 latest.json 到 GitHub Release
          $uploadUrl = "https://uploads.github.com/repos/$repo/releases/$releaseId/assets?name=latest.json"
          $uploadHeaders = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "Content-Type" = "application/json"
          }
          $jsonContent = Get-Content $latestJsonPath -Raw
          $uploadResponse = Invoke-RestMethod -Uri $uploadUrl -Method Post -Headers $uploadHeaders -Body $jsonContent
          Write-Host "CDN 版 latest.json 已上传到 GitHub Release (asset ID: $($uploadResponse.id))"

      # 提交 updater/latest.json 到 GitHub 仓库
      # 注意：不再推送到 Gitee 仓库，因为国内下载已通过 CDN 代理加速
      - name: Commit updater/latest.json to repository
        shell: pwsh
        run: |
          $updaterFile = "${{ github.workspace }}\updater\latest.json"
          if (-not (Test-Path $updaterFile)) {
            Write-Host "updater/latest.json 不存在，跳过提交"
            exit 0
          }

          # 检查是否有变更
          $hasChanges = & git status --porcelain updater/latest.json
          if (-not $hasChanges) {
            Write-Host "updater/latest.json 无变更，跳过提交"
            exit 0
          }

          # 读取版本号
          $configPath = "${{ github.workspace }}\src-tauri\tauri.conf.json"
          $configVersion = (Get-Content $configPath -Raw | ConvertFrom-Json).version

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updater/latest.json
          git commit -m "chore: update latest.json for v$configVersion [skip ci]"

          # 推送到 GitHub（使用 GITHUB_TOKEN，仅推 GitHub，不再推 Gitee）
          git push origin HEAD:main
          Write-Host "updater/latest.json 已提交到 GitHub 仓库"
